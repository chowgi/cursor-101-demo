name: React Vite CI
on:
  pull_request:
    branches: [master]
    paths:
      - 'apps/react-vite/**'
      - '.github/workflows/react-vite-ci.yml'
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/react-vite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Enable Corepack
        run: corepack enable
      - name: Set environment variables
        run: mv .env.example .env
      - name: Install dependencies
        run: yarn install
      - name: Build application
        run: yarn build
      - name: Run tests
        run: yarn test --run
